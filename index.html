<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestInsight Pro - 실시간 투자 분석</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-rocket"></i>
                <span>InvestInsight</span>
            </div>
            
            <nav id="mainNav">
                <div class="nav-section">
                    <p class="nav-label">분석 메뉴</p>
                    <ul>
                        <li class="active" data-view="home"><i class="fas fa-home"></i> 홈</li>
                        <li data-view="market" data-filter="지수"><i class="fas fa-chart-pie"></i> 글로벌 지수</li>
                        <li data-view="market" data-filter="ETF"><i class="fas fa-layer-group"></i> ETF 포트폴리오</li>
                        <li data-view="market" data-filter="암호화폐"><i class="fas fa-coins"></i> 암호화폐</li>
                    </ul>
                </div>
                
                <div class="nav-section">
                    <p class="nav-label">내 즐겨찾기</p>
                    <ul id="favoriteList">
                        <li class="empty-msg">자산을 추가하세요</li>
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="suggestion-box">
                    <form action="https://formspree.io/f/xbdakngv" method="POST">
                        <input type="text" name="asset_request" placeholder="추가 요청 (예: NVDA)" required>
                        <button type="submit" class="suggest-btn">종목 요청</button>
                    </form>
                </div>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <header>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="assetSearch" placeholder="자산, 티커, 인덱스 검색...">
                </div>
            </header>

            <section id="dashboard" class="dashboard">
                <!-- 1. 초기 웰컴 화면 -->
                <div id="welcomeScreen" class="view-content">
                    <div class="welcome-hero">
                        <h1>스마트한 투자의 시작</h1>
                        <p>전문가 수준의 데이터 분석과 인사이트를 경험하세요.</p>
                        <div class="quick-tags">
                            <span onclick="handleSearch('S&P500')">S&P 500</span>
                            <span onclick="handleSearch('나스닥100')">나스닥</span>
                            <span onclick="handleSearch('QQQ')">QQQ</span>
                            <span onclick="handleSearch('SCHD')">SCHD</span>
                            <span onclick="handleSearch('비트코인')">비트코인</span>
                        </div>
                    </div>
                </div>

                <!-- 2. 시장 탐색 화면 (카테고리 클릭 시) -->
                <div id="marketView" class="view-content hidden">
                    <h2 id="marketTitle">글로벌 지수 현황</h2>
                    <div id="marketGrid" class="market-grid">
                        <!-- 자산 카드들이 여기에 렌더링됨 -->
                    </div>
                </div>

                <!-- 3. 자산 상세 분석 화면 -->
                <div id="assetDetail" class="view-content hidden">
                    <div class="asset-header">
                        <div class="asset-info">
                            <div class="title-row">
                                <h1 id="assetName">자산 이름</h1>
                                <button id="favBtn" class="fav-btn"><i class="far fa-star"></i></button>
                            </div>
                            <div class="meta-row">
                                <span id="assetSymbol" class="symbol">SYMBOL</span>
                                <span id="assetCategory" class="category-tag">카테고리</span>
                            </div>
                        </div>
                        <div class="asset-price">
                            <span id="currentPrice" class="price">0</span>
                            <span id="priceChange" class="change">0%</span>
                        </div>
                    </div>

                    <div class="chart-section">
                        <div class="chart-header">
                            <!-- 세련된 기간 선택 버튼 -->
                            <div class="period-selector">
                                <button class="period-btn" data-period="1D">1D</button>
                                <button class="period-btn" data-period="1W">1W</button>
                                <button class="period-btn active" data-period="1M">1M</button>
                                <button class="period-btn" data-period="1Y">1Y</button>
                                <button class="period-btn" data-period="ALL">ALL</button>
                            </div>
                            <div class="chart-info">
                                <i class="fas fa-info-circle"></i> 리얼타임 시뮬레이션
                            </div>
                        </div>
                        <div id="mainChart" class="chart-container"></div>
                    </div>

                    <div class="insights-container">
                        <div class="insight-card">
                            <h3><i class="fas fa-brain"></i> AI 고도화 분석 인사이트</h3>
                            <div id="insightText" class="insight-text">데이터 분석 중...</div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item highlight">
                                <span class="label">리스크 등급</span>
                                <span id="riskStat" class="value">-</span>
                            </div>
                            <div class="stat-item">
                                <span class="label">기간 내 최고가</span>
                                <span id="highPriceStat" class="value">0</span>
                            </div>
                            <div class="stat-item">
                                <span class="label">기간 내 최저가</span>
                                <span id="lowPriceStat" class="value">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
